name: Trigger homelab deploy

# Tells the homelab repo that master moved. Homelab's update-blog workflow
# re-pins its `blog` flake input and rides the normal CI/CD pipeline, so the
# live site follows master within minutes of a push.

on:
  push:
    branches: [master]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to smg1024/homelab
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_PAT }}
        run: gh api repos/smg1024/homelab/dispatches -f event_type=blog-updated
